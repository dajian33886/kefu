# Deployment-ready database configuration.
# Use MySQL via environment variables in production.
server.port=8080
spring.application.name=kefu-backend
management.server.port=8080
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.endpoint.health.roles=NONE
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/kefu2?useSSL=false&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:kefu2}
spring.datasource.password=${DB_PASSWORD:kefu2}
spring.jpa.database-platform=org.hibernate.dialect.MySQL57Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
jwt.secret=${JWT_SECRET:xQ7#pZ9&vM2!kL4*sN1@bR3^fT5$gH8%jW6+eY0~dU}
